<!DOCTYPE html><html class="dark" lang="en"><head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>DUTCH_OS_V0.1 // INITIATION_COMPLETE</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./output.css">
</head>

  <body class="text-on-surface">
    <div class="scanlines"></div>
    <!-- Header -->
    <header class="w-full z-50 flex justify-between items-center px-6 py-4 bg-[#200e0e] border-t-4 border-[#ff5626] shadow-[inset_0_0_15px_rgba(255,86,38,0.15)] shrink-0">
      <div class="flex items-center gap-8">
        <h1 class="text-2xl font-black text-[#ffb5a1] tracking-widest uppercase text-shadow-[0_0_8px_rgba(255,181,161,0.6)]" style="">DUTCH_V0.1</h1>
        <nav class="hidden md:flex gap-6 text-[10px] uppercase font-bold tracking-widest opacity-70">
          <span class="text-[#ffb5a1] border-b-2 border-[#ffb5a1]" style="">SESSION:ACTIVE</span>
          <span class="" style=""><br></span>
        </nav>
      </div>
      <div class="flex items-center gap-4">
        <div class="bg-tertiary-container px-4 py-2 border-l-20 border-tertiary flex items-center gap-3">
          <span class="text-on-tertiary-container font-black uppercase text-xs tracking-widest" style="">CURRENT TURN:</span>
          <span class="text-on-tertiary-container font-bold uppercase" style="">Player1</span>
        </div>
        <button class="p-2 text-[#ffb5a1] hover:bg-[#3a2424] transition-none" style=""><span class="material-symbols-outlined" style="">settings</span></button>
        <button class="p-2 text-[#ffb5a1] hover:bg-[#3a2424] transition-none" style=""><span class="material-symbols-outlined" style="">terminal</span></button>
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <!-- Lobby Area -->
      <aside class="w-80 bg-[#1a0909] border-r-2 border-[#ff5626] flex flex-col z-40" id="lobby">
        <div class="p-6 border-b border-[#2e1a1a]">
          <div class="text-[10px] font-black text-[#ff5626] mb-4 tracking-[0.2em]" style="">CONNECTION_PORTAL</div>
          <div class="flex flex-col gap-3">
            <input class="bg-surface-container border-2 border-outline/30 px-4 py-3 text-sm font-bold tracking-widest focus:border-primary outline-none text-primary placeholder:text-primary/30" id="name" placeholder="ENTER NAME" type="text">
            <button class="w-full bg-secondary-container text-secondary py-3 font-black uppercase tracking-widest hover:brightness-125 transition-all blue-glow border-b-4 border-secondary/50" id="joinBtn">
              JOIN GAME
            </button>
          </div>
        </div>
        <div class="flex-1 p-6 overflow-y-auto">
          <div class="text-[10px] font-black text-secondary mb-4 tracking-[0.2em]" style="">ACTIVE_NODES</div>
          <ul class="flex flex-col gap-2" id="playersList">
            <!-- <li class="flex items-center gap-3 p-3 bg-surface-container/50 border-l-4 border-secondary" style=""> -->
              <!-- <span class="material-symbols-outlined text-sm text-secondary" style="">radio_button_checked</span> -->
              <!-- <span class="text-xs font-bold uppercase tracking-wider" style="">Player1</span> -->
              <!-- <span class="ml-auto text-[8px] bg-secondary/20 text-secondary px-1 font-black" style="">LOCAL</span> -->
            <!-- </li> -->
          </ul>
          <button class="mt-4 w-full border-2 border-[#ff5626] text-[#ff5626] py-2 font-black uppercase text-xs tracking-widest hover:bg-[#ff5626]/10" id="startBtn" style="display: none;">
            INITIATE START
          </button>
        </div>
      </aside>
      <!-- Main Game Table -->
      <main class="flex-1 relative overflow-hidden bg-[radial-gradient(circle_at_center,_#2a1616_0%,_#200e0e_100%)]">
        <div class="game-table">
          <!-- Top Player -->
          <div class="player-area top">
            <div class="flex flex-col items-center -rotate-180">
              <div class="text-[10px] text-primary/40 font-black mb-2 tracking-widest" style="">Player3</div>
              <div class="card-grid" id="hand-top">
                <div class="card opacity-40 border-dashed border-primary/20 bg-transparent" style="">EMPTY</div>
                <div class="card opacity-40 border-dashed border-primary/20 bg-transparent" style="">EMPTY</div>
                <div class="card opacity-40 border-dashed border-primary/20 bg-transparent" style="">EMPTY</div>
                <div class="card opacity-40 border-dashed border-primary/20 bg-transparent" style="">EMPTY</div>
              </div>
            </div>
          </div>
          <!-- Left Player -->
          <div class="player-area left">
            <div class="flex flex-col items-center -rotate-270">
              <div class="text-[10px] text-primary/40 font-black mb-1 tracking-widest" style="">NODE_WEST</div>
              <div class="card-grid" id="hand-left">
                <div class="card opacity-40 border-dashed border-primary/20 bg-transparent" style="">EMPTY</div>
                <div class="card opacity-40 border-dashed border-primary/20 bg-transparent" style="">EMPTY</div>
                <div class="card opacity-40 border-dashed border-primary/20 bg-transparent" style="">EMPTY</div>
                <div class="card opacity-40 border-dashed border-primary/20 bg-transparent" style="">EMPTY</div>
              </div>
            </div>
          </div>
          <!-- Center Area -->
          <div class="center-area flex items-center justify-center gap-12 relative">
            <!-- Deck -->
            <div class="flex flex-col items-center gap-2">
              <div class="card deck border-secondary text-secondary blue-glow relative cursor-pointer hover:scale-105 transition-transform" id="deck">
                <span class="material-symbols-outlined text-4xl" style="">playing_cards</span>
                <div class="absolute -right-1 -bottom-1 w-full h-full border-r border-b border-secondary/30 -z-10"></div>
              </div>
              <div class="text-[10px] font-black text-secondary/60 tracking-widest uppercase" style="">Deck</div>
            </div>
            <!-- Discard Pile -->
            <div class="flex flex-col items-center gap-2">
              <div class="card discardPile border-primary-container text-primary-container bg-surface-container-high/50 flex flex-col cursor-pointer hover:scale-105 transition-transform" id="discardPile">
                <span class="text-2xl font-black glow-text" style="">7</span>
                <!-- CHECK DECK CLASS TO PUT UNICODE SIMBOLS -->
                <span class="text-2xl" style="">♤</span>
                <!-- $♤, ♡, ♢, ♧$ -->
              </div>
              <div class="text-[10px] font-black text-primary-container/60 tracking-widest uppercase" style="">Discard</div>
            </div>
            <!-- Drawn Card -->
            <div class="flex flex-col items-center gap-2">
              <div class="card drawnCard border-secondary text-secondary blue-glow relative " id="drawnCard">
                <span class="" id="" style="">EMPTY</span>
                <div class="absolute -right-1 -bottom-1 w-full h-full border-r border-b border-secondary/30 -z-10"></div>
              </div>
              <div class="text-[10px] font-black text-secondary/60 tracking-widest uppercase" style="">Drawn Card</div>
            </div>
            <!-- Background visual noise -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 border border-primary/5 rounded-full -z-10"></div>
          </div>
          <!-- Right Player -->
          <div class="player-area right justify-end">
            <div class="flex flex-col items-center rotate-270">
              <div class="text-[10px] text-primary/40 font-black mb-2 tracking-widest" style="">NODE_EAST</div>
              <div class="card-grid" id="hand-right">
                <div class="card opacity-40 border-dashed border-primary/20 bg-transparent" style="">EMPTY</div>
                <div class="card opacity-40 border-dashed border-primary/20 bg-transparent" style="">EMPTY</div>
                <div class="card opacity-40 border-dashed border-primary/20 bg-transparent" style="">EMPTY</div>
                <div class="card opacity-40 border-dashed border-primary/20 bg-transparent" style="">EMPTY</div>
              </div>
            </div>
          </div>
          <!-- Bottom Player (Active User) -->
          <div class="player-area bottom flex flex-col items-center justify-end pb-4 gap-6">
            <div class="flex flex-col items-center">
              <div class="text-[10px] text-secondary font-black mb-4 tracking-widest flex items-center gap-2" style="">Player1</div>
              <div class="card-grid" id="hand-bottom">
                <div class="card border-primary text-primary glow-text" style="">EMPTY</div>
                <div class="card border-primary text-primary glow-text" style="">EMPTY</div>
                <div class="card border-primary text-primary glow-text" style="">EMPTY</div>
                <div class="card border-primary text-primary glow-text" style="">EMPTY</div>
              </div>
            </div>
            <!-- Bottom Controls -->
            <div class="flex gap-4">
              <div class="bg-[#ff5626] text-black px-8 py-3 font-black text-xs uppercase tracking-[0.2em] cursor-pointer hover:brightness-110 active:translate-y-1 transition-all flex items-center gap-2" id="drawBtn" style="">
                <span class="material-symbols-outlined text-sm" style="">add_box</span>
                Switch Card
              </div>
              <div class="bg-[#3a2424] text-primary border border-primary/30 px-8 py-3 font-black text-xs uppercase tracking-[0.2em] cursor-pointer hover:bg-primary/10 active:translate-y-1 transition-all flex items-center gap-2" id="discardBtn" style="">
                <span class="material-symbols-outlined text-sm" style="">delete</span>
                Discard Card
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Ambient Radiation Shadow -->
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary-container opacity-5 blur-[150px] rounded-full pointer-events-none -z-10"></div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body></html>
